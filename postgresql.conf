listen_addresses = '127.0.0.1'
port = 5432
max_connections = 200

# Memory
shared_buffers = 1GB
work_mem = 16MB
maintenance_work_mem = 256MB
effective_cache_size = 3GB

# WAL
wal_level = replica
max_wal_size = 2GB
min_wal_size = 512MB

# Logging
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_min_duration_statement = 500
log_line_prefix = '%t [%p] %u@%d '
