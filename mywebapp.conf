server {
    listen 80;
    server_name _;

     location = / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
    }

    location /items {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
    }

    location /health/ {
        deny all;
        return 404;
    }
}
